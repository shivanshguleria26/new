<!DOCTYPE html>
<html>
<head>

<title>Riya's Surprise ❤️</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:#0b0c2a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
color:white;
text-align:center;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0.2}
50%{opacity:1}
}

/* shooting star */

.shoot{
position:absolute;
width:120px;
height:2px;
background:linear-gradient(90deg,white,transparent);
animation:shoot 2s linear;
}

@keyframes shoot{
0%{transform:translate(-200px,-200px);}
100%{transform:translate(100vw,100vh);}
}

/* buttons */

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

#yes{background:#28a745;color:white;}
#no{background:red;color:white;position:absolute;}

#question{display:none;}
#proposal{display:none;}
#final{display:none;width:70%;font-size:26px}

/* hearts */

.heart{
position:absolute;
font-size:24px;
animation:rise 5s linear infinite;
}

@keyframes rise{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* balloons */

.balloon{
position:absolute;
width:40px;
height:50px;
border-radius:50%;
animation:balloonRise 6s linear infinite;
}

@keyframes balloonRise{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* ring animation */

.ring{
font-size:80px;
animation:ringSpin 3s infinite linear;
}

@keyframes ringSpin{
0%{transform:rotateY(0deg) scale(1)}
50%{transform:rotateY(180deg) scale(1.3)}
100%{transform:rotateY(360deg) scale(1)}
}

</style>
</head>

<body onclick="start()">

<h1 id="hello">Hello Riya ❤️</h1>
<p id="tap">Tap anywhere to start</p>

<div id="question">

<h2>Do you love me?</h2>

<button id="yes" onclick="yes()">YES ❤️</button>
<button id="no" onmouseover="move()">NO 💔</button>

</div>

<div id="proposal">

<div class="ring">💍</div>

<h2>Will you go out with me?</h2>

<button onclick="accept()">YES 💖</button>

</div>

<div id="final">

<h1>I'm really glad you said yes ❤️</h1>

<p>
I enjoy talking with you and spending time with you.
You make normal days feel more special.
I don't know where this journey will lead,
but I’d really like to walk it with you.
</p>

</div>

<!-- music -->

<iframe
id="music"
width="0"
height="0"
src=""
allow="autoplay">
</iframe>

<script>

/* start */

function start(){

document.getElementById("hello").style.display="none"
document.getElementById("tap").style.display="none"
document.getElementById("question").style.display="block"

}

/* move NO */

function move(){

let btn=document.getElementById("no")

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

btn.style.left=x+"px"
btn.style.top=y+"px"

}

/* first YES */

function yes(){

document.getElementById("question").style.display="none"
document.getElementById("proposal").style.display="block"

playMusic()
hearts()
balloons()
heartExplosion()

}

/* second YES */

function accept(){

document.getElementById("proposal").style.display="none"
document.getElementById("final").style.display="block"

}

/* play song */

function playMusic(){

document.getElementById("music").src=
"https://www.youtube.com/embed/CnEqrgMlWLQ?autoplay=1&controls=0"

}

/* floating hearts */

function hearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),5000)

},300)

}

/* balloons */

function balloons(){

setInterval(()=>{

let b=document.createElement("div")

b.className="balloon"

b.style.left=Math.random()*100+"vw"

let colors=["red","pink","yellow","purple"]

b.style.background=
colors[Math.floor(Math.random()*colors.length)]

document.body.appendChild(b)

setTimeout(()=>b.remove(),6000)

},700)

}

/* heart explosion */

function heartExplosion(){

for(let i=0;i<30;i++){

let heart=document.createElement("div")

heart.innerHTML="💖"

heart.style.position="absolute"
heart.style.left="50%"
heart.style.top="50%"
heart.style.fontSize="30px"

let x=(Math.random()-0.5)*600
let y=(Math.random()-0.5)*600

heart.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],
{duration:2000})

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),2000)

}

}

/* stars */

for(let i=0;i<150;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

document.body.appendChild(star)

}

/* shooting stars */

setInterval(()=>{

let s=document.createElement("div")

s.className="shoot"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*50+"vh"

document.body.appendChild(s)

setTimeout(()=>s.remove(),2000)

},4000)

</script>

</body>
</html>
